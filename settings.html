<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harrison Holt's Web Dev Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="project_desc.css">
</head>
<body>

            <header class="shadow mb-3 p-3 d-flex flex-row align-items-center justify-content-between">
                <h1 class="m-0">Harrison Holt</h1>
                <div class="portfolio_sections">
                    <nav>
                        <a href="index.html">Home</a>
                    </nav>
                </div>
            </header>

            <main class="d-flex flex-column align-items-center">
                <h3>Accessibility Settings</h3>

                <!-- Accordion with zoomTarget for each collapsible body -->
                <div class="accordion accordion-flush w-100" id="accordionFlushExample">
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                                Light & Dark Mode Settings
                            </button>
                        </h2>
                        <div id="flush-collapseOne" class="accordion-collapse collapse zoomTarget" data-bs-parent="#accordionFlushExample">
                            <div class="accordion-body">
                                <h3>Light & Dark Mode Settings</h3>
                                <button class="btn btn-primary" id="light_dark_setting_button">Enable Dark Mode</button>
                            </div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseTwo" aria-expanded="false" aria-controls="flush-collapseTwo">
                                GreyScale Mode Settings
                            </button>
                        </h2>
                        <div id="flush-collapseTwo" class="accordion-collapse collapse zoomTarget" data-bs-parent="#accordionFlushExample">
                            <div class="accordion-body">
                                <h3>GreyScale Mode Settings</h3>
                                <button class="btn btn-primary" id="greyscale_button">Enable GreyScale Mode</button>
                            </div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseThree" aria-expanded="false" aria-controls="flush-collapseThree">
                                High Contrast Mode Settings
                            </button>
                        </h2>
                        <div id="flush-collapseThree" class="accordion-collapse collapse zoomTarget" data-bs-parent="#accordionFlushExample">
                            <div class="accordion-body">
                                <h3>High Contrast Mode Settings</h3>
                                <button class="btn btn-primary" id="high_contrast_button">Enable High Contrast Mode</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="settings.js"></script>

</body>
</html>
