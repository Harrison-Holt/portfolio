<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnifying Glass Effect</title>
    <style>
        /* Basic page content */
        body {
            font-family: Arial, sans-serif;
        }

        /* The content container (for the zoomable area) */
        #content {
            width: 100%;
            height: 1000px;
            padding: 20px;
            background-color: #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        /* Magnifier styles */
        #magnifier {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #70BEBC; /* Soft Seafoam */
            position: absolute;
            pointer-events: none; /* Let mouse clicks pass through */
            overflow: hidden;
            display: none; /* Initially hidden */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2); /* Subtle shadow for magnifier */
            z-index: 9999;
        }

        /* Zoomed content inside the magnifier */
        #zoomed-content {
            position: absolute;
            transform: scale(2); /* Zoom level */
            transform-origin: top left;
        }

        /* To hide the content under the magnifier */
        #content.hidden-under-magnifier {
            opacity: 0.5; /* Dim the content when the magnifier is active */
        }
    </style>
</head>
<body>

<button id="toggle_magnifier">Enable Magnifying Glass</button>

<div id="content">
    <p>Move the magnifying glass over this content to see the zoom effect. This text and any other content inside this div will be zoomed in when the magnifying glass is enabled.</p>
    <p>You can zoom in on text, images, or any other content that is inside this container.</p>
</div>

<div id="magnifier">
    <div id="zoomed-content"></div> <!-- The zoomed content inside the magnifier -->
</div>

<script>
    const toggleButton = document.getElementById('toggle_magnifier');
    const magnifier = document.getElementById('magnifier');
    const content = document.getElementById('content');
    const zoomedContent = document.getElementById('zoomed-content');
    let magnifierEnabled = false;

    // Clone the content inside the zoomed-content div
    zoomedContent.innerHTML = content.innerHTML;

    // Enable/Disable magnifier
    toggleButton.addEventListener('click', () => {
        magnifierEnabled = !magnifierEnabled;
        if (magnifierEnabled) {
            toggleButton.textContent = 'Disable Magnifying Glass';
        } else {
            toggleButton.textContent = 'Enable Magnifying Glass';
            magnifier.style.display = 'none'; // Hide magnifier when disabled
            content.classList.remove('hidden-under-magnifier');
        }
    });

    // Handle mouse movement for the magnifier
    content.addEventListener('mousemove', (event) => {
        if (magnifierEnabled) {
            magnifier.style.display = 'block'; // Show the magnifier when enabled
            const mouseX = event.pageX;
            const mouseY = event.pageY;

            // Position the magnifier around the mouse pointer
            magnifier.style.left = `${mouseX - 75}px`; // Center the magnifier
            magnifier.style.top = `${mouseY - 75}px`;

            // Calculate the position for the zoomed content inside the magnifier
            const contentRect = content.getBoundingClientRect();
            const offsetX = mouseX - contentRect.left;
            const offsetY = mouseY - contentRect.top;

            // Properly adjust the zoom to match the cursor position within the magnifier
            zoomedContent.style.left = `-${offsetX * 2 - 75}px`; // Adjust for zoom factor (2x)
            zoomedContent.style.top = `-${offsetY * 2 - 75}px`;  // Adjust for zoom factor (2x)

            // Hide the content under the magnifier
            content.classList.add('hidden-under-magnifier');
        }
    });

    // Optional: Hide magnifier when mouse leaves the content
    content.addEventListener('mouseleave', () => {
        magnifier.style.display = 'none';
        content.classList.remove('hidden-under-magnifier'); // Restore visibility
    });
</script>

</body>
</html>
