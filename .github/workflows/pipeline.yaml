name: Deploying Portfolio Site Including Accessibility Testing

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  accessibility_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Pa11y
        run: npm install -g pa11y

      - name: Run Pa11y Tests
        run: |
            echo '{ "args": ["--no-sandbox", "--disable-setuid-sandbox", "--disable-gpu", "--single-process"] }' > config.json
            pa11y https://www.harrisonholt.dev/index.html --chrome-launch-config config.json

      
    
  deploy:
    runs-on: ubuntu-latest
    needs: accessibility_test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy To Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel --prod --token $VERCEL_TOKEN

